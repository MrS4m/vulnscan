version: '3.8'

services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: flashscan-backend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - CORS_ORIGIN=*
      - NMAP_PATH=nmap # O binário está instalado no Linux via apt-get, disponivel globalmente no PATH
    env_file:
      - .env
    restart: unless-stopped
    # Se precisar de varreduras agressivas em rede local mapeada, remova o comentario abaixo:
    # network_mode: host

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:3000/api/v1}
        - VITE_SUPABASE_URL=${SUPABASE_URL}
        - VITE_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
    container_name: flashscan-frontend
    ports:
      - "8000:80" # Mapeia a porta 80 do Nginx dentro do container para a 8000 do seu host
    restart: unless-stopped
    depends_on:
      - backend
